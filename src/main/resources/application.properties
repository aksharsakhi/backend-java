# Credere AI — Java Backend
# Configure secrets and provider in backend-java/.env
GEMINI_API_KEY=
GEMINI_MODEL=gemini-2.5-flash
LLM_PROVIDER=gemini
GROQ_API_KEY=
GROQ_MODEL=llama-3.3-70b-versatile

# Upload limits (for large annual reports)
spring.servlet.multipart.max-file-size=220MB
spring.servlet.multipart.max-request-size=220MB
server.tomcat.max-swallow-size=230MB
spring.codec.max-in-memory-size=32MB
